<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G — JARVIS HUD</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & base ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0a0e17;
  --bg2:       #0d1321;
  --panel:     rgba(0, 212, 255, 0.04);
  --border:    rgba(0, 212, 255, 0.15);
  --accent:    #00d4ff;
  --accent2:   #0066ff;
  --warn:      #ff9900;
  --danger:    #ff3366;
  --ok:        #00ff88;
  --muted:     rgba(0, 212, 255, 0.45);
  --text:      #c8e6ff;
  --text-dim:  rgba(200, 230, 255, 0.45);
  --font:      'JetBrains Mono', monospace;
  --radius:    8px;
  --glow:      0 0 18px rgba(0, 212, 255, 0.25);
  --glow-sm:   0 0 8px  rgba(0, 212, 255, 0.20);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  overflow: hidden;
}

/* ── Grid layout ─────────────────────────────────────────────────────────── */
#app {
  display: grid;
  height: 100vh;
  grid-template-rows: 52px 1fr 160px;
  grid-template-columns: 280px 1fr 260px;
  grid-template-areas:
    "header  header  header"
    "left    center  right"
    "input   input   input";
  gap: 6px;
  padding: 6px;
}

/* ── Scanline overlay ────────────────────────────────────────────────────── */
#app::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, 0.05) 2px,
    rgba(0, 0, 0, 0.05) 4px
  );
  pointer-events: none;
  z-index: 999;
}

/* ── Glass panel base ────────────────────────────────────────────────────── */
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  backdrop-filter: blur(6px);
  overflow: hidden;
  position: relative;
}

.panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.4;
}

/* ── Header ──────────────────────────────────────────────────────────────── */
#header {
  grid-area: header;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-ring {
  width: 32px; height: 32px;
  border: 2px solid var(--accent);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--glow);
  animation: pulse-ring 3s ease-in-out infinite;
}

.logo-ring svg { width: 16px; height: 16px; fill: var(--accent); }

.logo-text {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 4px;
  color: var(--accent);
  text-shadow: var(--glow-sm);
}

.logo-sub {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 2px;
  margin-top: 2px;
}

.header-center {
  text-align: center;
}

#status-text {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: color 0.3s;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 11px;
  color: var(--muted);
}

#ws-indicator {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--danger);
  box-shadow: 0 0 6px var(--danger);
  transition: background 0.3s, box-shadow 0.3s;
}

#ws-indicator.connected {
  background: var(--ok);
  box-shadow: 0 0 6px var(--ok);
}

/* ── Left panel — system stats ───────────────────────────────────────────── */
#left {
  grid-area: left;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.section-title {
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
  padding: 10px 12px 6px;
  border-bottom: 1px solid var(--border);
}

.metric-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 12px;
}

.metric-label { color: var(--text-dim); font-size: 11px; }
.metric-value { color: var(--accent); font-weight: 500; }

.metric-bar-wrap {
  padding: 2px 12px 8px;
}

.metric-bar {
  height: 3px;
  background: rgba(0, 212, 255, 0.1);
  border-radius: 2px;
  overflow: hidden;
}

.metric-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius: 2px;
  transition: width 0.8s ease;
  box-shadow: 0 0 6px var(--accent);
}

.metric-bar-fill.warn { background: linear-gradient(90deg, #ff6600, var(--warn)); }
.metric-bar-fill.danger { background: linear-gradient(90deg, #cc0033, var(--danger)); }

/* ── Center panel — conversation ─────────────────────────────────────────── */
#center {
  grid-area: center;
  display: flex;
  flex-direction: column;
}

#arc-container {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px 0 8px;
  position: relative;
}

#arc-ring {
  width: 90px; height: 90px;
  position: relative;
}

#arc-ring svg {
  width: 90px; height: 90px;
  transform: rotate(-90deg);
}

#arc-ring .arc-track {
  fill: none;
  stroke: rgba(0, 212, 255, 0.1);
  stroke-width: 3;
}

#arc-ring .arc-fill {
  fill: none;
  stroke: var(--accent);
  stroke-width: 3;
  stroke-linecap: round;
  stroke-dasharray: 251.2;
  stroke-dashoffset: 251.2;
  transition: stroke-dashoffset 0.6s ease, stroke 0.3s;
  filter: drop-shadow(0 0 4px var(--accent));
}

.arc-label {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#arc-mode {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
}

#arc-state {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  text-shadow: var(--glow-sm);
}

#messages {
  flex: 1 1 auto;
  overflow-y: auto;
  padding: 8px 16px 4px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.msg {
  display: flex;
  flex-direction: column;
  gap: 2px;
  animation: msg-in 0.25s ease;
}

.msg-role {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
}

.msg-bubble {
  padding: 8px 12px;
  border-radius: var(--radius);
  font-size: 12px;
  line-height: 1.5;
  max-width: 92%;
}

.msg.user .msg-bubble {
  background: rgba(0, 102, 255, 0.15);
  border: 1px solid rgba(0, 102, 255, 0.3);
  color: var(--text);
  align-self: flex-end;
}

.msg.user .msg-role { align-self: flex-end; }

.msg.ai .msg-bubble {
  background: rgba(0, 212, 255, 0.06);
  border: 1px solid var(--border);
  color: var(--text);
}

.msg.proactive .msg-bubble {
  background: rgba(255, 153, 0, 0.08);
  border: 1px solid rgba(255, 153, 0, 0.25);
  color: var(--text);
}

.msg.proactive .msg-role { color: var(--warn); }

/* Typing cursor */
.typing-cursor::after {
  content: '▋';
  animation: blink 0.7s step-end infinite;
  color: var(--accent);
}

/* Tool badge */
.tool-badge {
  display: inline-block;
  font-size: 9px;
  padding: 1px 6px;
  background: rgba(0, 212, 255, 0.1);
  border: 1px solid rgba(0, 212, 255, 0.2);
  border-radius: 3px;
  color: var(--accent);
  letter-spacing: 1px;
  margin-bottom: 3px;
}

/* ── Right panel — event log ─────────────────────────────────────────────── */
#right {
  grid-area: right;
  display: flex;
  flex-direction: column;
}

#event-log {
  flex: 1 1 auto;
  overflow-y: auto;
  padding: 4px 0;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.log-entry {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  padding: 4px 10px;
  font-size: 10px;
  line-height: 1.4;
  border-bottom: 1px solid rgba(0, 212, 255, 0.04);
  animation: log-in 0.15s ease;
}

.log-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  margin-top: 4px;
  flex-shrink: 0;
}

.log-ts { color: var(--text-dim); white-space: nowrap; }
.log-text { color: var(--text); word-break: break-word; flex: 1; }

/* ── Input bar ───────────────────────────────────────────────────────────── */
#input-area {
  grid-area: input;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
}

#cmd-input {
  flex: 1;
  background: rgba(0, 212, 255, 0.04);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

#cmd-input:focus {
  border-color: var(--accent);
  box-shadow: var(--glow-sm);
}

#cmd-input::placeholder { color: var(--text-dim); }

.btn {
  background: rgba(0, 212, 255, 0.08);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--accent);
  font-family: var(--font);
  font-size: 11px;
  padding: 10px 16px;
  cursor: pointer;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: background 0.2s, box-shadow 0.2s;
}

.btn:hover {
  background: rgba(0, 212, 255, 0.15);
  box-shadow: var(--glow-sm);
}

.btn:active { transform: scale(0.97); }

/* ── Notification toast ──────────────────────────────────────────────────── */
#toast-container {
  position: fixed;
  top: 60px; right: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 1000;
}

.toast {
  background: rgba(13, 19, 33, 0.95);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-size: 11px;
  max-width: 300px;
  line-height: 1.5;
  animation: toast-in 0.3s ease;
  backdrop-filter: blur(8px);
}

.toast.warn { border-left-color: var(--warn); }
.toast.danger { border-left-color: var(--danger); }

/* ── Animations ──────────────────────────────────────────────────────────── */
@keyframes pulse-ring {
  0%, 100% { box-shadow: 0 0 8px rgba(0,212,255,0.3); }
  50% { box-shadow: 0 0 20px rgba(0,212,255,0.6); }
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

@keyframes msg-in {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes log-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes toast-in {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ── Scrollbar styling ───────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">

  <!-- ── Header ─────────────────────────────────────────────── -->
  <div id="header" class="panel">
    <div class="logo">
      <div class="logo-ring">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div>
        <div class="logo-text">G</div>
        <div class="logo-sub">JARVIS INTELLIGENCE</div>
      </div>
    </div>
    <div class="header-center">
      <div id="status-text">INITIALIZING</div>
      <div id="clock" style="font-size:20px;font-weight:300;color:var(--accent);margin-top:2px;letter-spacing:2px;">--:--:--</div>
    </div>
    <div class="header-right">
      <div id="date-str" style="letter-spacing:1px;">---</div>
      <span id="camera-indicator" title="Camera (EDITH)" style="opacity: 0.3; font-size: 0.8rem;">&#x1F4F7;</span>
      <div style="display:flex;align-items:center;gap:6px;">
        <div id="ws-indicator"></div>
        <span id="ws-label">OFFLINE</span>
      </div>
    </div>
  </div>

  <!-- ── Left: System stats ──────────────────────────────────── -->
  <div id="left" class="panel" style="overflow-y:auto;">
    <div class="section-title">System Status</div>

    <div class="metric-row">
      <span class="metric-label">CPU</span>
      <span class="metric-value" id="val-cpu">--</span>
    </div>
    <div class="metric-bar-wrap">
      <div class="metric-bar"><div class="metric-bar-fill" id="bar-cpu" style="width:0%"></div></div>
    </div>

    <div class="metric-row">
      <span class="metric-label">RAM</span>
      <span class="metric-value" id="val-ram">--</span>
    </div>
    <div class="metric-bar-wrap">
      <div class="metric-bar"><div class="metric-bar-fill" id="bar-ram" style="width:0%"></div></div>
    </div>

    <div class="metric-row">
      <span class="metric-label">DISK</span>
      <span class="metric-value" id="val-disk">--</span>
    </div>
    <div class="metric-bar-wrap">
      <div class="metric-bar"><div class="metric-bar-fill" id="bar-disk" style="width:0%"></div></div>
    </div>

    <div class="metric-row">
      <span class="metric-label">BATTERY</span>
      <span class="metric-value" id="val-battery">--</span>
    </div>
    <div class="metric-bar-wrap">
      <div class="metric-bar"><div class="metric-bar-fill" id="bar-battery" style="width:0%"></div></div>
    </div>

    <div class="health-section" style="margin-top: 12px; padding-top: 8px; border-top: 1px solid rgba(0,168,255,0.1);">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
            <span style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim);">System Health</span>
            <span id="system-health" style="padding: 1px 6px; border-radius: 3px; font-size: 0.65rem; font-weight: 600; background: rgba(0,255,136,0.15); color: #00ff88;">HEALTHY</span>
        </div>
        <div style="display: flex; gap: 16px; font-size: 0.75rem; color: var(--muted); margin-bottom: 4px;">
            <span>Uptime: <span id="uptime">--</span></span>
            <span>Queries: <span id="interaction-count">0</span></span>
        </div>
        <div id="component-health" style="font-size: 0.7rem;"></div>
        <div id="recent-errors" style="font-size: 0.7rem; margin-top: 4px;">
            <span style="color: var(--text-dim);">No recent errors</span>
        </div>
    </div>

    <div class="section-title" style="margin-top:4px;">Context</div>
    <div class="metric-row" style="flex-direction:column;align-items:flex-start;gap:4px;">
      <span class="metric-label">ACTIVE WINDOW</span>
      <span style="color:var(--text);font-size:11px;padding:0 2px;word-break:break-all;" id="val-window">--</span>
    </div>
    <div class="metric-row" style="flex-direction:column;align-items:flex-start;gap:4px;padding-top:6px;">
      <span class="metric-label">TIME OF DAY</span>
      <span class="metric-value" id="val-timeofday">--</span>
    </div>
    <div class="metric-row" style="flex-direction:column;align-items:flex-start;gap:4px;padding-top:6px;">
      <span class="metric-label">NETWORK</span>
      <span class="metric-value" id="val-network">--</span>
    </div>
  </div>

  <!-- ── Center: Conversation ────────────────────────────────── -->
  <div id="center" class="panel">
    <!-- Arc reactor state indicator -->
    <div id="arc-container">
      <div id="arc-ring">
        <svg viewBox="0 0 90 90">
          <circle class="arc-track" cx="45" cy="45" r="40"/>
          <circle class="arc-fill" id="arc-circle" cx="45" cy="45" r="40"/>
        </svg>
        <div class="arc-label">
          <div id="arc-mode">IDLE</div>
          <div id="arc-state">●</div>
        </div>
      </div>
    </div>

    <!-- Conversation stream -->
    <div id="messages"></div>
  </div>

  <!-- ── Right: Event log ────────────────────────────────────── -->
  <div id="right" class="panel">
    <div class="section-title">Event Log</div>
    <div id="event-log"></div>
  </div>

  <!-- ── Input bar ───────────────────────────────────────────── -->
  <div id="input-area" class="panel">
    <input
      id="cmd-input"
      type="text"
      placeholder="Type a command and press Enter (or use voice)…"
      autocomplete="off"
    />
    <button class="btn" id="send-btn">Send</button>
    <button class="btn" id="clear-btn" style="color:var(--text-dim);">Clear</button>
  </div>

</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const WS_URL = `ws://${location.hostname}:8767/ws`;
const RECONNECT_DELAY = 3000;
const MAX_MESSAGES = 80;
const MAX_LOG = 120;

// ── State ─────────────────────────────────────────────────────────────────────
let ws = null;
let reconnectTimer = null;
let currentAiMsg = null;   // streaming AI message element
let assistantMode = 'IDLE';

// ── DOM refs ─────────────────────────────────────────────────────────────────
const $msgs     = document.getElementById('messages');
const $log      = document.getElementById('event-log');
const $status   = document.getElementById('status-text');
const $wsInd    = document.getElementById('ws-indicator');
const $wsLabel  = document.getElementById('ws-label');
const $clock    = document.getElementById('clock');
const $date     = document.getElementById('date-str');
const $arcMode  = document.getElementById('arc-mode');
const $arcState = document.getElementById('arc-state');
const $arcCircle= document.getElementById('arc-circle');
const $input    = document.getElementById('cmd-input');
const $sendBtn  = document.getElementById('send-btn');
const $clearBtn = document.getElementById('clear-btn');
const $toasts   = document.getElementById('toast-container');

// ── Clock ─────────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  $clock.textContent = now.toTimeString().slice(0,8);
  $date.textContent = now.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'}).toUpperCase();
}
updateClock();
setInterval(updateClock, 1000);

// ── Arc reactor ───────────────────────────────────────────────────────────────
const ARC_STATES = {
  idle:       { pct: 0.08, color: 'rgba(0,212,255,0.3)', label: '●',    mode: 'IDLE'       },
  active:     { pct: 0.45, color: '#00d4ff',             label: '◉',    mode: 'ACTIVE'     },
  listening:  { pct: 0.70, color: '#00ff88',             label: '◎',    mode: 'LISTENING'  },
  processing: { pct: 0.85, color: '#0066ff',             label: '◌',    mode: 'THINKING'   },
  speaking:   { pct: 0.60, color: '#00d4ff',             label: '◑',    mode: 'SPEAKING'   },
  error:      { pct: 0.20, color: '#ff3366',             label: '✕',    mode: 'ERROR'      },
};

function setArcState(state) {
  const cfg = ARC_STATES[state] || ARC_STATES.idle;
  const circumference = 251.2;
  const offset = circumference - cfg.pct * circumference;
  $arcCircle.style.strokeDashoffset = offset;
  $arcCircle.style.stroke = cfg.color;
  $arcCircle.style.filter = `drop-shadow(0 0 6px ${cfg.color})`;
  $arcMode.textContent = cfg.mode;
  $arcState.textContent = cfg.label;
  $arcState.style.color = cfg.color;
  $arcState.style.textShadow = `0 0 8px ${cfg.color}`;
}

setArcState('idle');

// ── Metric bars ───────────────────────────────────────────────────────────────
function setMetric(id, pct, label) {
  const bar = document.getElementById('bar-' + id);
  const val = document.getElementById('val-' + id);
  if (!bar || !val) return;
  bar.style.width = Math.min(100, pct) + '%';
  val.textContent = label;
  bar.className = 'metric-bar-fill';
  if (pct >= 90) bar.classList.add('danger');
  else if (pct >= 70) bar.classList.add('warn');
}

// ── Messages ─────────────────────────────────────────────────────────────────
function addMessage(role, text, extra) {
  // Cancel any current streaming bubble
  if (currentAiMsg) {
    currentAiMsg.querySelector('.msg-bubble').classList.remove('typing-cursor');
    currentAiMsg = null;
  }
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  let badge = '';
  if (extra && extra.tool) {
    badge = `<div class="tool-badge">⚙ ${extra.tool}</div>`;
  }
  div.innerHTML = `
    <div class="msg-role">${role === 'user' ? '▷ YOU' : role === 'proactive' ? '⚡ PROACTIVE' : '◈ G'}</div>
    ${badge}
    <div class="msg-bubble">${escHtml(text)}</div>
  `;
  $msgs.appendChild(div);

  // Trim to MAX_MESSAGES
  while ($msgs.children.length > MAX_MESSAGES) $msgs.removeChild($msgs.firstChild);
  $msgs.scrollTop = $msgs.scrollHeight;
  return div;
}

function startAiStream() {
  if (currentAiMsg) {
    currentAiMsg.querySelector('.msg-bubble').classList.remove('typing-cursor');
  }
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `
    <div class="msg-role">◈ G</div>
    <div class="msg-bubble typing-cursor"></div>
  `;
  $msgs.appendChild(div);
  while ($msgs.children.length > MAX_MESSAGES) $msgs.removeChild($msgs.firstChild);
  $msgs.scrollTop = $msgs.scrollHeight;
  currentAiMsg = div;
  return div;
}

function appendToAiStream(text) {
  if (!currentAiMsg) startAiStream();
  const bubble = currentAiMsg.querySelector('.msg-bubble');
  bubble.textContent += text + ' ';
  $msgs.scrollTop = $msgs.scrollHeight;
}

function finalizeAiStream() {
  if (currentAiMsg) {
    currentAiMsg.querySelector('.msg-bubble').classList.remove('typing-cursor');
    currentAiMsg = null;
  }
}

// ── Event log ─────────────────────────────────────────────────────────────────
const LOG_COLORS = {
  speech: '#00ff88',  input: '#00ff88',  response: '#00d4ff',
  tts_sentence: '#00d4ff', tts_done: '#00d4ff', tts_interrupted: '#ff9900',
  tool_called: '#0066ff', tool_result: '#0066ff', tool_error: '#ff3366',
  proactive: '#ff9900', proactive_urgent: '#ff6600',
  state_idle: 'rgba(0,212,255,0.4)', state_active: '#00d4ff',
  error: '#ff3366', startup: '#00ff88', reminder: '#ff9900',
  context: 'rgba(0,212,255,0.25)', ping: 'rgba(0,212,255,0.1)',
  snapshot: '#0066ff',
};

function addLog(type, text) {
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  const color = LOG_COLORS[type] || 'rgba(0,212,255,0.4)';
  const ts = new Date().toTimeString().slice(0,8);
  entry.innerHTML = `
    <div class="log-dot" style="background:${color};box-shadow:0 0 4px ${color}"></div>
    <span class="log-ts">${ts}</span>
    <span class="log-text">${escHtml(String(text).slice(0, 120))}</span>
  `;
  $log.appendChild(entry);
  while ($log.children.length > MAX_LOG + 1) $log.removeChild($log.children[1]);
  $log.scrollTop = $log.scrollHeight;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(text, level='info', duration=5000) {
  const t = document.createElement('div');
  t.className = `toast ${level === 'warn' ? 'warn' : level === 'danger' ? 'danger' : ''}`;
  t.textContent = text;
  $toasts.appendChild(t);
  setTimeout(() => {
    t.style.opacity = '0';
    t.style.transition = 'opacity 0.4s';
    setTimeout(() => $toasts.removeChild(t), 400);
  }, duration);
}

// ── Event dispatcher ──────────────────────────────────────────────────────────
function handleEvent(ev) {
  const type    = ev.type || 'unknown';
  const payload = ev.payload || {};

  switch (type) {
    case 'snapshot':
      applySnapshot(ev.payload || {});
      addLog('snapshot', 'Awareness snapshot received');
      break;

    case 'speech':
    case 'input': {
      const txt = payload.text || payload.transcript || '';
      if (txt) {
        addMessage('user', txt);
        addLog(type, `▷ ${txt.slice(0,80)}`);
        setArcState('processing');
        $status.textContent = 'PROCESSING';
      }
      break;
    }

    case 'mode': {
      const mode = (payload.mode || '').toUpperCase();
      addLog('mode', `Mode → ${mode}`);
      $status.textContent = mode || 'PROCESSING';
      break;
    }

    case 'tool_called': {
      const name = payload.name || payload.tool || 'tool';
      addLog('tool_called', `⚙ ${name}(${JSON.stringify(payload.args || {}).slice(0,60)})`);
      break;
    }

    case 'tool_result': {
      const name = payload.name || payload.tool || 'tool';
      addLog('tool_result', `✓ ${name} → ${String(payload.result || '').slice(0,80)}`);
      break;
    }

    case 'tool_error': {
      const name = payload.name || payload.tool || 'tool';
      addLog('tool_error', `✕ ${name}: ${String(payload.error || '').slice(0,80)}`);
      break;
    }

    case 'tts_sentence': {
      const sentence = payload.sentence || payload.text || '';
      if (sentence) {
        appendToAiStream(sentence);
        setArcState('speaking');
        $status.textContent = 'SPEAKING';
        addLog('tts_sentence', `◈ ${sentence.slice(0,80)}`);
      }
      break;
    }

    case 'response': {
      const resp = payload.response || payload.text || '';
      if (resp) {
        // If we have a streaming bubble, finalize it; otherwise show full message
        if (currentAiMsg) {
          const bubble = currentAiMsg.querySelector('.msg-bubble');
          if (!bubble.textContent.trim()) {
            bubble.textContent = resp;
          }
          finalizeAiStream();
        } else {
          addMessage('ai', resp);
        }
        addLog('response', `◈ ${resp.slice(0,80)}`);
        setArcState('active');
        $status.textContent = 'READY';
      }
      break;
    }

    case 'tts_done':
      finalizeAiStream();
      setArcState('active');
      $status.textContent = 'READY';
      addLog('tts_done', 'TTS completed');
      break;

    case 'tts_interrupted':
      finalizeAiStream();
      setArcState('listening');
      $status.textContent = 'LISTENING';
      addLog('tts_interrupted', 'Barge-in detected');
      break;

    case 'proactive':
    case 'proactive_urgent': {
      const msg = payload.message || payload.text || '';
      const score = payload.score || 0;
      if (msg) {
        addMessage('proactive', msg);
        addLog(type, `⚡ [${score}] ${msg.slice(0,80)}`);
        if (type === 'proactive_urgent') {
          showToast(`⚡ ${msg}`, 'warn', 8000);
        }
      }
      break;
    }

    case 'state_idle':
      setArcState('idle');
      $status.textContent = 'IDLE — WAITING FOR WAKE WORD';
      addLog('state_idle', 'State → IDLE');
      break;

    case 'state_active':
      setArcState('active');
      $status.textContent = 'ACTIVE';
      addLog('state_active', 'State → ACTIVE');
      break;

    case 'startup': {
      const provider = payload.provider || '';
      const model    = payload.model || '';
      setArcState('active');
      $status.textContent = 'ONLINE';
      addLog('startup', `Startup complete — ${provider} / ${model}`);
      showToast(`G online — ${provider} / ${model}`, 'info', 4000);
      break;
    }

    case 'error': {
      const err = payload.error || payload.message || 'Unknown error';
      addLog('error', `✕ ${String(err).slice(0,100)}`);
      setArcState('error');
      break;
    }

    case 'reminder': {
      const text = payload.title || payload.text || 'Reminder fired';
      addLog('reminder', `⏰ ${text.slice(0,80)}`);
      showToast(`⏰ ${text}`, 'warn', 8000);
      break;
    }

    case 'context':
      applySnapshot(payload);
      break;

    case 'ping':
      ws && ws.send(JSON.stringify({type:'pong'}));
      break;

    case 'health_update':
    case 'system.health_update': {
      var d = payload || {};
      var hel = document.getElementById('system-health');
      if (hel && d.health) {
        hel.textContent = d.health.toUpperCase();
        var colors = {healthy: '#00ff88', degraded: '#ff9500', critical: '#ff3b3b'};
        var bgs = {healthy: 'rgba(0,255,136,0.15)', degraded: 'rgba(255,149,0,0.15)', critical: 'rgba(255,59,59,0.15)'};
        hel.style.color = colors[d.health] || '#888';
        hel.style.background = bgs[d.health] || 'transparent';
      }
      var uel = document.getElementById('uptime');
      if (uel) uel.textContent = d.uptime || '--';
      var iel = document.getElementById('interaction-count');
      if (iel) iel.textContent = d.interactions || 0;
      var cel = document.getElementById('component-health');
      if (cel && d.components) {
        var html = '';
        for (var name in d.components) {
          var c = d.components[name];
          var color = c.health === 'healthy' ? '#00ff88' : (c.health === 'degraded' ? '#ff9500' : '#ff3b3b');
          html += '<div style="display:flex;justify-content:space-between;padding:1px 0;color:var(--muted);">';
          html += '<span>' + name + '</span>';
          html += '<span style="color:' + color + ';">' + c.success_rate + '% \u00B7 ' + c.avg_latency_ms + 'ms</span>';
          html += '</div>';
        }
        cel.innerHTML = html;
      }
      var eel = document.getElementById('recent-errors');
      if (eel && d.recent_errors && d.recent_errors.length > 0) {
        var ehtml = '';
        d.recent_errors.slice(-3).forEach(function(err) {
          ehtml += '<div style="color:#ff9500;padding:1px 0;">' + err.component + ': ' + (err.error||'').substring(0,40) + '</div>';
        });
        eel.innerHTML = ehtml;
      } else if (eel && d.recent_errors && d.recent_errors.length === 0) {
        eel.innerHTML = '<span style="color: var(--text-dim);">No recent errors</span>';
      }
      break;
    }

    default: {
      // Camera perception events
      var topic = type || '';
      if (topic.includes('camera.started')) {
        var ci = document.getElementById('camera-indicator');
        if (ci) { ci.style.opacity = '1'; ci.title = 'Camera active'; }
        addLog('startup', 'Camera perception started');
      }
      if (topic.includes('camera.stopped')) {
        var ci2 = document.getElementById('camera-indicator');
        if (ci2) { ci2.style.opacity = '0.3'; ci2.title = 'Camera off'; }
        addLog('context', 'Camera perception stopped');
      }
      if (topic.includes('camera.gesture')) {
        addLog('tool_called', 'Gesture: ' + ((payload && payload.gesture) || '?'));
      }
      if (topic.includes('camera.user_present')) {
        var present = payload && payload.present;
        addLog(present ? 'startup' : 'state_idle', present ? 'User detected' : 'User left');
      }
      addLog(type, JSON.stringify(payload).slice(0, 100));
      break;
    }
  }
}

// ── Snapshot applier ──────────────────────────────────────────────────────────
function applySnapshot(s) {
  if (!s) return;

  if (s.cpu_percent != null)    setMetric('cpu',     s.cpu_percent,    `${s.cpu_percent.toFixed(0)}%`);
  if (s.ram_percent != null)    setMetric('ram',     s.ram_percent,    `${s.ram_percent.toFixed(0)}%`);
  if (s.disk_percent != null)   setMetric('disk',    s.disk_percent,   `${s.disk_percent.toFixed(0)}%`);
  if (s.battery_percent != null) {
    const charging = s.battery_charging ? ' ⚡' : '';
    setMetric('battery', s.battery_percent, `${s.battery_percent.toFixed(0)}%${charging}`);
  }

  if (s.active_app)            document.getElementById('val-window').textContent = s.active_app;
  if (s.time_of_day)           document.getElementById('val-timeofday').textContent = s.time_of_day.toUpperCase();
  if (s.network_available != null) {
    document.getElementById('val-network').textContent = s.network_available ? 'ONLINE' : 'OFFLINE';
    document.getElementById('val-network').style.color = s.network_available ? 'var(--ok)' : 'var(--danger)';
  }
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect() {
  if (ws) return;
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    $wsInd.classList.add('connected');
    $wsLabel.textContent = 'ONLINE';
    $status.textContent = 'CONNECTED';
    addLog('startup', `WebSocket connected to ${WS_URL}`);
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  };

  ws.onmessage = (e) => {
    try {
      const ev = JSON.parse(e.data);
      handleEvent(ev);
    } catch(err) {
      console.warn('HUD WS parse error:', err, e.data);
    }
  };

  ws.onerror = (e) => {
    addLog('error', 'WebSocket error');
  };

  ws.onclose = () => {
    ws = null;
    $wsInd.classList.remove('connected');
    $wsLabel.textContent = 'OFFLINE';
    $status.textContent = 'RECONNECTING…';
    addLog('error', `WebSocket closed — retry in ${RECONNECT_DELAY/1000}s`);
    reconnectTimer = setTimeout(connect, RECONNECT_DELAY);
  };
}

// ── Send command ──────────────────────────────────────────────────────────────
function sendCommand() {
  const text = $input.value.trim();
  if (!text) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    showToast('Not connected to G', 'danger');
    return;
  }
  ws.send(JSON.stringify({type:'command', payload:{text}}));
  $input.value = '';
}

$sendBtn.addEventListener('click', sendCommand);
$input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendCommand(); });
$clearBtn.addEventListener('click', () => {
  $msgs.innerHTML = '';
  $log.querySelectorAll('.log-entry').forEach(e => e.remove());
});

// ── Utility ───────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
addLog('startup', 'HUD initializing…');
connect();
</script>
